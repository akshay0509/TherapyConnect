## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/therapist
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

jwt.public-key=file:D:/keys/gateway-public.pem

## AES key for session notes: APP_ENCRYPTION_SECRET env var wins when set in
## the run config (keeps previously encrypted local notes readable); otherwise
## falls back to this dev-only key (base64 of a fixed 32-byte string)
app.encryption.secret=${APP_ENCRYPTION_SECRET:ZGV2LW9ubHktYWVzLWtleS0zMi1ieXRlcy1sb25nISE=}
