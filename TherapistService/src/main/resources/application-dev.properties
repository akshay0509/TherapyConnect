## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/therapist
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

jwt.public-key=file:D:/keys/gateway-public.pem

## dev-only AES key (base64 of a fixed 32-byte string) — session notes
## encrypted locally with this key are unreadable in prod and vice versa
app.encryption.secret=ZGV2LW9ubHktYWVzLWtleS0zMi1ieXRlcy1sb25nISE=
