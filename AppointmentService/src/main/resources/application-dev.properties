## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/appointment
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

jwt.public-key=file:D:/keys/gateway-public.pem

## Razorpay stays unconfigured locally — isConfigured() returns false and the
## whole payment-link flow degrades to a no-op by design. Set the TEST-mode
## keys as env vars if payment flows need local testing.
