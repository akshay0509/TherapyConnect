spring.application.name=appointment-service
server.port=5005
eureka.instance.prefer-ip-address=true

##database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

##kafka server properties
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.auto-offset-reset=earliest

# Delegate deserializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Error handling deserializers
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Consumer group
spring.kafka.consumer.group-id=appointment-service-availability-events

# JSON config
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.consumer.properties.reconnect.backoff.max.ms=10000
spring.kafka.producer.properties.reconnect.backoff.max.ms=10000

#logging.level.org.springframework.kafka=DEBUG
#logging.level.org.apache.kafka=INFO

##log4j
logging.config=classpath:log4j2.xml
logging.level.root=ERROR
logging.level.com.org.therapistService=INFO
logging.level.org.springframework.boot.autoconfigure=DEBUG

##key config
jwt.public-key=classpath:keys/gateway-public.pem

##razorpay (leave blank to disable payments globally)
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

##actuator
management.endpoints.web.exposure.include=health
