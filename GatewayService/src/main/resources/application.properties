spring.application.name=gateway-service
server.port=8091
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webmvc.discovery.locator.enabled=false
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=false

spring.cloud.gateway.server.webmvc.routes[0].id=therapistId_route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://THERAPIST-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/therapist/{tid}/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=AddRequestHeader=X-Therapist-ID, {tid}
spring.cloud.gateway.server.webmvc.routes[0].filters[1]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[1].id=client_route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://CLIENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/client/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[2].id=therapist_route
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://THERAPIST-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/therapist/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[3].id=user_route
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[4].id=appointment_route
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://APPOINTMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/appointment/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[5].id=analytics_route
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/analytics/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=StripPrefix=1

logging.config=classpath:log4j2.xml
logging.level.root=ERROR
logging.level.com.org.gatewayService=INFO
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.springframework.security=DEBUG

##key config
jwt.private-key=classpath:keys/gateway-private.pem
jwt.public-key=classpath:keys/gateway-public.pem

##database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

##kafka server properties
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.properties.reconnect.backoff.max.ms=10000

## Resilience4j - Rate Limiter (login endpoint)
resilience4j.ratelimiter.instances.loginRateLimiter.limitForPeriod=10
resilience4j.ratelimiter.instances.loginRateLimiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.loginRateLimiter.timeoutDuration=0s

## Resilience4j - Circuit Breakers
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.therapistService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.therapistService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.therapistService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.therapistService.permittedNumberOfCallsInHalfOpenState=3

##actuator
management.endpoints.web.exposure.include=health

##frontend url (for CORS)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

## Admin credentials (set via env vars — never hardcode)
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
