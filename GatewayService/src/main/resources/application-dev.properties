## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026). Note: the local
## gateway DB is the default "postgres" database, unlike the VM's "gateway".
## Keys: DEV-ONLY keypair at D:/keys — never the production keys:
##   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out D:/keys/gateway-private.pem
##   openssl rsa -pubout -in D:/keys/gateway-private.pem -out D:/keys/gateway-public.pem

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

jwt.private-key=file:D:/keys/gateway-private.pem
jwt.public-key=file:D:/keys/gateway-public.pem

## dev-only admin credentials (local machine only — prod uses env vars)
admin.username=admin
admin.password=admin-dev-only

app.frontend-url=http://localhost:5173
