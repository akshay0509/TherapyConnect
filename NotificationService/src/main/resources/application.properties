spring.application.name=notification-service
server.port=5004
eureka.instance.prefer-ip-address=true

##database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

##kafka server properties
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=notification-service-events
spring.kafka.consumer.auto-offset-reset=earliest

# Delegate deserializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Error handling deserializers
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# JSON config — type headers are OFF end to end for outbox topics. Consumers
# dispatch on the eventType field in the payload, so the __TypeId__ header was
# never used; deserialization always yields JsonNode via the default type, and
# trusted.packages no longer applies (nothing is resolved from headers).
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.fasterxml.jackson.databind.JsonNode

# Serializers (needed for DLT publishing)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

##log4j config
logging.config=classpath:log4j2.xml
logging.level.root=ERROR
logging.level.com.org.notificationService=INFO

## Google Calendar config -- values from environment / secrets manager
google.calendar.application-name=Therapy Platform
google.calendar.client-id=${GOOGLE_CLIENT_ID}
google.calendar.client-secret=${GOOGLE_CLIENT_SECRET}
google.calendar.refresh-token=${GOOGLE_REFRESH_TOKEN}
# fallback attendee email, used only when TherapistProjection has no email for
# the therapist (e.g. rows created before the email field existed)
google.calendar.therapist-email=${THERAPIST_EMAIL:}

##actuator
management.endpoints.web.exposure.include=health
