## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/notification
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

## Google Calendar: off locally unless the GOOGLE_* env vars are set in the
## run config — the placeholders below let them punch through; without them
## these resolve to empty and invite creation fails at call time only.
google.calendar.client-id=${GOOGLE_CLIENT_ID:}
google.calendar.client-secret=${GOOGLE_CLIENT_SECRET:}
google.calendar.refresh-token=${GOOGLE_REFRESH_TOKEN:}
google.calendar.therapist-email=appintegrationtesting2@gmail.com
