## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/notification
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

## Google Calendar is off locally — invite creation fails at call time only.
## Set the real values as env vars if calendar testing is needed.
google.calendar.client-id=
google.calendar.client-secret=
google.calendar.refresh-token=
google.calendar.therapist-email=appintegrationtesting2@gmail.com
