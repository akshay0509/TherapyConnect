## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/user
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

jwt.public-key=file:D:/keys/gateway-public.pem

## Gmail: off locally unless the GOOGLE_* env vars are set in the run config —
## the placeholders below let them punch through; without them these resolve
## to empty and password-reset/username emails fail at send time only.
google.gmail.client-id=${GOOGLE_CLIENT_ID:}
google.gmail.client-secret=${GOOGLE_CLIENT_SECRET:}
google.gmail.refresh-token=${GOOGLE_REFRESH_TOKEN:}
google.gmail.from=appintegrationtesting2@gmail.com

app.frontend-url=http://localhost:5173
