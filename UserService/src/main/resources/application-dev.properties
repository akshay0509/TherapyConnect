## Local development profile — activate with SPRING_PROFILES_ACTIVE=dev
## Infra: locally installed postgres (5432) and kafka (9092).
## Datasource values mirror the STS launch configs (Jul 2026).

spring.datasource.url=jdbc:postgresql://localhost:5432/user
spring.datasource.username=postgres
spring.datasource.password=password

spring.kafka.bootstrap-servers=localhost:9092

jwt.public-key=file:D:/keys/gateway-public.pem

## Gmail is off locally — password-reset/username emails fail at send time
## only. Set the real values as env vars if email testing is needed.
google.gmail.client-id=
google.gmail.client-secret=
google.gmail.refresh-token=
google.gmail.from=appintegrationtesting2@gmail.com

app.frontend-url=http://localhost:5173
