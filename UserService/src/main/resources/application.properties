spring.application.name=user-service
server.port=5003
eureka.instance.prefer-ip-address=true

##database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

##kafka server properties
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Consumer group
spring.kafka.consumer.group-id=user-service-login-events
spring.kafka.consumer.auto-offset-reset=earliest

# Error handling deserializers
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate deserializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# JSON config
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=com.org.events.login

##log4j config
logging.config=classpath:log4j2.xml
logging.level.root=ERROR
logging.level.com.org.userService=INFO
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.springframework.security=DEBUG

##key config
jwt.public-key=classpath:keys/gateway-public.pem

## Gmail API config reuses same OAuth credentials as NotificationService
google.gmail.client-id=${GOOGLE_CLIENT_ID}
google.gmail.client-secret=${GOOGLE_CLIENT_SECRET}
google.gmail.refresh-token=${GOOGLE_REFRESH_TOKEN}
google.gmail.application-name=Therapy Platform
google.gmail.from=${GMAIL_FROM}

## Application config
app.frontend-url=${FRONTEND_URL:http://localhost:5173}