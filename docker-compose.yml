version: '3.8'

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: tc-postgres
    environment:
      TZ: Asia/Kolkata
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - therapy-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:latest
    container_name: tc-kafka
    environment:
      TZ: Asia/Kolkata
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - therapy-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Discovery (Eureka) ────────────────────────────────────────────────────

  discovery:
    build:
      context: ./DiscoveryService
      dockerfile: Dockerfile
    container_name: tc-discovery
    image: therapy-discovery:latest
    environment:
      TZ: Asia/Kolkata
    ports:
      # loopback only: the Eureka dashboard/API has no auth and leaks the full
      # service topology — reach it via SSH tunnel if needed
      - "127.0.0.1:8761:8761"
    volumes:
      - ./logs:/logs
    networks:
      - therapy-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── API Gateway ───────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./GatewayService
      dockerfile: Dockerfile
    container_name: tc-gateway
    image: therapy-gateway:latest
    ports:
      - "8091:8091"
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/gateway
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      JWT_PUBLIC_KEY: file:/app/keys/gateway-public.pem
      JWT_PRIVATE_KEY: file:/app/keys/gateway-private.pem
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── User Service ──────────────────────────────────────────────────────────

  user:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: tc-user
    image: therapy-user:latest
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/user
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      JWT_PUBLIC_KEY: file:/app/keys/gateway-public.pem
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      GMAIL_FROM: ${GMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Therapist Service ─────────────────────────────────────────────────────

  therapist:
    build:
      context: ./TherapistService
      dockerfile: Dockerfile
    container_name: tc-therapist
    image: therapy-therapist:latest
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/therapist
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      JWT_PUBLIC_KEY: file:/app/keys/gateway-public.pem
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET}
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Client Service ────────────────────────────────────────────────────────

  client:
    build:
      context: ./ClientService
      dockerfile: Dockerfile
    container_name: tc-client
    image: therapy-client:latest
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/client
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      JWT_PUBLIC_KEY: file:/app/keys/gateway-public.pem
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Appointment Service ───────────────────────────────────────────────────

  appointment:
    build:
      context: ./AppointmentService
      dockerfile: Dockerfile
    container_name: tc-appointment
    image: therapy-appointment:latest
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/appointment
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      JWT_PUBLIC_KEY: file:/app/keys/gateway-public.pem
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Notification Service ──────────────────────────────────────────────────

  notification:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: tc-notification
    image: therapy-notification:latest
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/notification
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      THERAPIST_EMAIL: ${THERAPIST_EMAIL}
    volumes:
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Analytics Service ─────────────────────────────────────────────────────

  analytics:
    build:
      context: ./AnalyticsService
      dockerfile: Dockerfile
    container_name: tc-analytics
    image: therapy-analytics:latest
    environment:
      TZ: Asia/Kolkata
      DB_URL: jdbc:postgresql://postgres:5432/analytics
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://discovery:8761/eureka/"}}}}'
      JWT_PUBLIC_KEY: file:/app/keys/gateway-public.pem
    volumes:
      - ./keys:/app/keys:ro
      - ./logs:/logs
    networks:
      - therapy-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Portainer ─────────────────────────────────────────────────────────────

  portainer:
    image: portainer/portainer-ce:latest
    container_name: tc-portainer
    environment:
      TZ: Asia/Kolkata
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - therapy-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  therapy-net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  portainer_data:
